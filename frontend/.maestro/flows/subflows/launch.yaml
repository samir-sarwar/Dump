appId: host.exp.Exponent
---
# Launch Expo Go (resume if already running)
- launchApp:
    appId: host.exp.Exponent
- waitForAnimationToEnd:
    timeout: 5000
# Dismiss Expo dev menu if it appears
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# If on Expo home screen, wait for Dump to appear and tap it
- tapOn:
    text: "Dump"
    optional: true
    waitUntilVisible: true
- waitForAnimationToEnd:
    timeout: 15000
# Dismiss dev menu if it appears after opening project
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# If already logged in (home feed visible), navigate to profile and logout
- tapOn:
    id: "tab.profile"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "profile.btn.logout"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Log Out"
    index: 1
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
# Now the login screen should be visible
- extendedWaitUntil:
    visible:
      id: "login.container"
    timeout: 60000
