appId: host.exp.Exponent
tags:
  - interactions
---
- evalScript: ${output.random = '' + Math.floor(Math.random() * 1000000)}
- runFlow:
    file: ../subflows/launch.yaml
- runFlow:
    file: ../subflows/register-user.yaml
    env:
      TEST_NAME: "Bookmark Tester"
      TEST_USERNAME: "bookmarktester${output.random}"
      TEST_EMAIL: "bookmark_${output.random}@dump.test"
      TEST_PASSWORD: "Secure1234!"
# Create an event
- tapOn:
    id: "tab.upload"
- waitForAnimationToEnd
- tapOn:
    id: "selectEvent.btn.createEvent"
- waitForAnimationToEnd
- tapOn:
    id: "createEvent.input.title"
- inputText: "Bookmark Test Event"
- tapOn:
    id: "createEvent.input.location"
- inputText: "Bangkok"
- hideKeyboard
- tapOn:
    id: "createEvent.btn.submit"
- waitForAnimationToEnd:
    timeout: 15000
# Go to profile and open event media
- tapOn:
    id: "tab.profile"
- waitForAnimationToEnd
- tapOn:
    id: "profile.card.featuredEvent"
- waitForAnimationToEnd:
    timeout: 8000
# Bookmark (if media exists)
- tapOn:
    id: "interaction.bookmark"
    optional: true
- waitForAnimationToEnd
# Unbookmark
- tapOn:
    id: "interaction.bookmark"
    optional: true
- waitForAnimationToEnd
