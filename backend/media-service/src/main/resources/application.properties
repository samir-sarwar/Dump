spring.application.name=media-service
server.port=8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/dump_media
spring.datasource.username=dump
spring.datasource.password=dump
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# gRPC Server
grpc.server.port=9093

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# S3 / MinIO
s3.endpoint=http://localhost:9000
s3.presign-endpoint=${S3_PRESIGN_ENDPOINT:http://localhost:9000}
s3.access-key=minioadmin
s3.secret-key=minioadmin
s3.bucket=dump-media
s3.region=us-east-1
