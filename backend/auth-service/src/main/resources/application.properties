spring.application.name=auth-service
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/dump_auth
spring.datasource.username=dump
spring.datasource.password=dump
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# gRPC Server
grpc.server.port=9091

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT
jwt.secret=dG9wLXNlY3JldC1rZXktZm9yLWR1bXAtYXBwLWRldi1vbmx5LWNoYW5nZS1pbi1wcm9k
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000
